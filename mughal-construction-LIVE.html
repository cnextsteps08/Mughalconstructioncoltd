<title>Mughal Construction</title>
<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0}

/* ── SC BANK DESIGN SYSTEM ── */
:root{
  --ink:      #111110;
  --ink2:     #5c5c58;
  --ink3:     #9c9c96;
  --rule:     #e4e4e0;
  --rule-lt:  #eeeeea;
  --surface:  #ffffff;
  --ground:   #f5f5f2;
  --ground2:  #efefe9;
  --accent:   #1e3560;
  --green:    #2a6b4a;
  --green-bg: #f0f7f3;
  --red:      #8b3a3a;
  --red-bg:   #fdf3f3;
  --orange:   #7a5020;
  --orange-bg:#fdf7ef;
  --label:    #111110;
  --label2:   #5c5c58;
  --label3:   #9c9c96;
  --blue:     #1e3560;
  --blue-bg:  #eef2fa;
  --card:     #ffffff;
  --bg:       #f5f5f2;
  --bg2:      #efefe9;
  --fill:     #ebebe6;
  --sep:      #e4e4e0;
  --sep-light:#eeeeea;
  --navy:     #1e3560;
  --navy-dk:  #14243f;
  --r-sm:     4px;
  --r-md:     6px;
  --r-lg:     10px;
  --shadow-xs:0 1px 2px rgba(0,0,0,.04);
  --shadow-sm:0 1px 4px rgba(0,0,0,.06);
  --shadow-md:0 2px 12px rgba(0,0,0,.08);
}

html,body{height:100%;background:var(--ground);color:var(--ink);font-family:-apple-system,'Helvetica Neue',Arial,sans-serif;-webkit-font-smoothing:antialiased;overflow:hidden}
::-webkit-scrollbar{display:none}
input,select,button,textarea{font-family:inherit;color:var(--ink);font-size:14px}
input::placeholder{color:var(--ink3)}

/* ── LAYOUT ── */
#s-main{position:fixed;inset:0;display:flex;flex-direction:column;background:var(--ground);overflow:hidden}
#mscrl{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;background:var(--ground)}
.screen{position:fixed;inset:0;background:var(--ground);transform:translateX(100%);transition:transform .28s cubic-bezier(.4,0,.2,1);z-index:100;overflow:hidden;display:flex;flex-direction:column}
.scrl{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
.screen.active{transform:translateX(0)}
#s-main{transform:none!important;z-index:0}

/* ── HEADER ── */
.hdr{background:#14243f;flex-shrink:0}
.hdr-top{display:flex;align-items:center;gap:14px;padding:16px 18px 12px}
.logo{width:32px;height:32px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.14);border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;color:#fff;flex-shrink:0;letter-spacing:0}
.brand{flex:1;min-width:0}
.brand-name{font-size:13px;font-weight:700;color:#fff;letter-spacing:.5px;text-transform:uppercase}
.brand-sub{font-size:9px;color:rgba(255,255,255,.38);margin-top:3px;letter-spacing:1.2px;text-transform:uppercase;display:flex;align-items:center;gap:8px}
.net-w{text-align:right;flex-shrink:0}
.net-a{font-size:16px;font-weight:600;color:#fff;font-variant-numeric:tabular-nums;letter-spacing:-.3px}
.net-l{font-size:8px;color:rgba(255,255,255,.38);text-transform:uppercase;letter-spacing:1px;margin-top:2px}

/* ── TABS ── */
.tabs{display:flex;padding:0 16px;overflow-x:auto;-webkit-overflow-scrolling:touch;padding-bottom:calc(2px + env(safe-area-inset-bottom,0px));border-top:1px solid rgba(255,255,255,.08)}
.tabs::-webkit-scrollbar{display:none}
.tab{flex-shrink:0;background:none;border:none;border-bottom:2px solid transparent;color:rgba(255,255,255,.38);font-size:11px;font-weight:600;padding:10px 14px;cursor:pointer;transition:all .18s;letter-spacing:.4px;text-transform:uppercase}
.tab.on{color:#fff;border-bottom-color:rgba(255,255,255,.7)}

/* ── OVERVIEW HERO ── */
.ov-hero{background:linear-gradient(160deg,#1e3560 0%,#162848 40%,#0d1c35 100%);padding:28px 18px 24px;position:relative;overflow:hidden}
.ov-hero::before{content:'';position:absolute;top:-80px;right:-60px;width:280px;height:280px;background:radial-gradient(circle,rgba(42,107,74,.12) 0%,transparent 60%);pointer-events:none}
.ov-hero::after{content:'';position:absolute;bottom:-80px;left:-40px;width:240px;height:240px;background:radial-gradient(circle,rgba(14,28,53,.7) 0%,transparent 65%);pointer-events:none}
.ov-stat-row{background:var(--surface);border-bottom:1px solid var(--rule);display:flex}
.ov-stat{flex:1;padding:12px 18px;border-right:1px solid var(--rule)}
.ov-stat:last-child{border-right:none}
.ov-stat-l{font-size:8px;color:var(--ink3);text-transform:uppercase;letter-spacing:1.2px;margin-bottom:5px}
.ov-stat-v{font-size:18px;font-weight:600;letter-spacing:-.5px;font-variant-numeric:tabular-nums;color:var(--ink)}
.ov-section{padding:20px 18px 8px;display:flex;align-items:center;justify-content:space-between}
.ov-section-title{font-size:8px;font-weight:700;color:var(--ink3);text-transform:uppercase;letter-spacing:1.5px}
.ov-section-count{font-size:9px;color:var(--ink3)}

/* ── PROJECT CARDS — JAPANESE MINIMAL ── */
.pc-wrap{padding:0}
.pc{background:var(--surface);display:flex;align-items:stretch;cursor:pointer;border-bottom:1px solid var(--rule);transition:background .12s}
.pc:first-child{border-top:1px solid var(--rule)}
.pc:active{background:var(--ground2)}
.pc-stripe{width:2px;flex-shrink:0}
.pc-body{flex:1;padding:16px 0 14px 16px;min-width:0}
.pc-top{display:flex;justify-content:space-between;align-items:baseline;gap:12px;margin-bottom:3px;padding-right:14px}
.pc-name{font-size:12px;font-weight:700;color:var(--ink);letter-spacing:.8px;text-transform:uppercase}
.pc-badge{font-size:13px;font-weight:600;font-variant-numeric:tabular-nums;flex-shrink:0;letter-spacing:-.3px}
.pc-meta{font-size:10px;color:var(--ink3);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;letter-spacing:.1px;margin-bottom:10px;padding-right:14px}
.pc-exp-label{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:5px;padding-right:14px}
.pc-exp-title{font-size:8px;font-weight:700;color:var(--ink3);text-transform:uppercase;letter-spacing:1.2px}
.pc-exp-amt{font-size:11px;font-weight:600;font-variant-numeric:tabular-nums;color:var(--ink2);letter-spacing:-.2px}
.pc-seg-bar{display:flex;height:3px;gap:0;margin-bottom:7px;background:var(--rule-lt);overflow:hidden}
.pc-seg{height:100%;transition:width .5s}
.pc-cats{display:flex;flex-wrap:wrap;gap:6px 10px;padding-right:14px;padding-bottom:2px}
.pc-cat{font-size:9px;color:var(--ink3);display:flex;align-items:center;gap:4px;white-space:nowrap}
.pc-cat-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.pc-arrow{display:flex;align-items:center;padding-right:14px;color:var(--ink3);font-size:14px;flex-shrink:0;font-weight:300;align-self:center}

/* Other accounts */
.pr2{display:flex;align-items:stretch;background:var(--surface);border-bottom:1px solid var(--rule);cursor:pointer;min-height:50px;transition:background .12s}
.pr2:first-child{border-top:1px solid var(--rule)}
.pr2:active{background:var(--ground2)}
.pr2-stripe{width:2px;flex-shrink:0}
.pr2-body{flex:1;padding:12px 14px;display:flex;align-items:center;justify-content:space-between;gap:10px;min-width:0}
.pr2-left{flex:1;min-width:0}
.pr2-name{font-size:11px;font-weight:700;color:var(--ink);text-transform:uppercase;letter-spacing:.6px}
.pr2-sub{font-size:10px;color:var(--ink3);margin-top:2px}
.pr2-bal{font-size:13px;font-weight:600;font-variant-numeric:tabular-nums;flex-shrink:0;letter-spacing:-.2px}
.pr2-arrow{display:flex;align-items:center;padding-right:14px;color:var(--ink3);font-size:14px;flex-shrink:0;font-weight:300}
.pc-stripe{width:2px;flex-shrink:0}
.pc-body{flex:1;padding:16px 14px 16px 16px;min-width:0}
.pc-top{display:flex;justify-content:space-between;align-items:baseline;gap:12px;margin-bottom:4px}
.pc-name{font-size:13px;font-weight:700;color:var(--ink);letter-spacing:.1px;text-transform:uppercase}
.pc-badge{font-size:13px;font-weight:600;font-variant-numeric:tabular-nums;flex-shrink:0;letter-spacing:-.2px}
.pc-meta{font-size:11px;color:var(--ink3);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;letter-spacing:.1px}
.pc-arrow{display:flex;align-items:center;padding-right:16px;color:var(--ink3);font-size:16px;flex-shrink:0;font-weight:300}

/* Other accounts row */
.pr2{display:flex;align-items:stretch;background:var(--surface);border-bottom:1px solid var(--rule);cursor:pointer;min-height:52px;transition:background .12s}
.pr2:first-child{border-top:1px solid var(--rule)}
.pr2:active{background:var(--ground)}
.pr2-stripe{width:2px;flex-shrink:0}
.pr2-body{flex:1;padding:13px 14px;display:flex;align-items:center;justify-content:space-between;gap:10px;min-width:0}
.pr2-left{flex:1;min-width:0}
.pr2-name{font-size:12px;font-weight:700;color:var(--ink);text-transform:uppercase;letter-spacing:.2px}
.pr2-sub{font-size:10px;color:var(--ink3);margin-top:2px}
.pr2-bal{font-size:13px;font-weight:600;font-variant-numeric:tabular-nums;flex-shrink:0;letter-spacing:-.2px}
.pr2-arrow{display:flex;align-items:center;padding-right:16px;color:var(--ink3);font-size:16px;flex-shrink:0;font-weight:300}

/* ── COLORS ── */
.gn{color:#2a6b4a!important}
.rd{color:#8b3a3a!important}
.bl{color:#1e3560!important}
.nt{background:#1e3560;color:#fff;font-size:8px;font-weight:700;padding:2px 6px;border-radius:2px;letter-spacing:.5px;text-transform:uppercase}

/* ── LEDGER ── */
.lr{display:flex;align-items:stretch;background:var(--surface);border-bottom:.5px solid var(--rule);overflow:visible}
.lst{width:2px;flex-shrink:0}
.lb{flex:1;display:flex;align-items:center;min-width:0;overflow:hidden}
.li{flex:1;padding:12px 8px 12px 14px;min-width:0}
.ld{display:flex;align-items:center;gap:6px;margin-bottom:3px}
.lt{font-size:12px;font-weight:600;color:var(--ink);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;min-width:0}
.lm{font-size:10px;color:var(--ink3);display:flex;align-items:center;gap:4px;flex-wrap:wrap;letter-spacing:.1px}
.lrr{flex-shrink:0;padding:12px 0 12px 6px;text-align:right;display:flex;flex-direction:column;align-items:flex-end;justify-content:center;gap:3px}
.la{font-size:13px;font-weight:600;font-variant-numeric:tabular-nums;letter-spacing:-.3px;color:var(--ink)}
.lp{font-size:8px;font-weight:600;text-transform:uppercase;letter-spacing:.6px;color:var(--ink3)}
.lac{display:flex;align-items:center;gap:5px;padding:0 12px 0 6px;flex-shrink:0}
.eb{background:var(--blue-bg);border:none;border-radius:var(--r-sm);color:var(--accent);font-size:11px;font-weight:700;padding:6px 12px;cursor:pointer;white-space:nowrap;letter-spacing:.4px;text-transform:uppercase;transition:opacity .15s}
.db{background:var(--red-bg);border:none;border-radius:var(--r-sm);color:var(--red);font-size:11px;font-weight:700;padding:6px 12px;cursor:pointer;white-space:nowrap;letter-spacing:.4px;text-transform:uppercase;transition:opacity .15s}

/* ── LEDGER SEARCH/FILTER ── */
.sb{padding:12px 16px 6px}
.si{width:100%;background:var(--surface);border:1px solid var(--rule);border-radius:var(--r-sm);padding:11px 14px;font-size:13px;outline:none;color:var(--ink)}
.si:focus{border-color:var(--accent)}
.fr{display:flex;gap:4px;padding:4px 16px;overflow-x:auto;-webkit-overflow-scrolling:touch}
.ch{flex-shrink:0;background:none;border:1px solid var(--rule);border-radius:2px;padding:5px 12px;font-size:10px;font-weight:600;color:var(--ink3);cursor:pointer;text-transform:uppercase;letter-spacing:.5px;transition:all .15s}
.ch.on{background:var(--accent);color:#fff;border-color:var(--accent)}
.ls{display:flex;justify-content:space-between;padding:10px 16px 6px;align-items:center}
.lc{font-size:10px;color:var(--ink3);font-weight:500;text-transform:uppercase;letter-spacing:.5px}
.ln{font-size:13px;font-weight:600;font-variant-numeric:tabular-nums;letter-spacing:-.3px}

/* ── DETAIL SCREEN ── */
.dba{text-align:right;flex-shrink:0}
.s-detail{position:fixed;inset:0;background:var(--ground);transform:translateX(100%);transition:transform .28s cubic-bezier(.4,0,.2,1);z-index:100;overflow:hidden;display:flex;flex-direction:column}
.s-detail.active{transform:translateX(0)}
.d-hdr{background:#14243f;padding:14px 16px 16px;flex-shrink:0}
.d-top{display:flex;align-items:center;gap:12px}
.d-back{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.14);color:#fff;width:34px;height:34px;border-radius:6px;cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;flex-shrink:0;line-height:1;transition:background .15s}
.d-back:active{background:rgba(255,255,255,.2)}
.dn{font-size:14px;font-weight:700;color:#fff;letter-spacing:.3px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;text-transform:uppercase}
.dc{font-size:10px;color:rgba(255,255,255,.45);letter-spacing:.2px;margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.print-btn{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.16);color:#fff;font-size:9px;font-weight:700;padding:6px 11px;border-radius:4px;cursor:pointer;text-transform:uppercase;letter-spacing:.6px;white-space:nowrap}
.d-acc{border-radius:0;margin:0;overflow:hidden;background:var(--surface);border-top:1px solid var(--rule);border-bottom:1px solid var(--rule)}
.d-acc-hdr{padding:14px 18px;border-bottom:1px solid var(--rule)}
.d-acc-title{font-size:8px;font-weight:700;color:var(--ink3);text-transform:uppercase;letter-spacing:1.2px;margin-bottom:4px}
.d-acc-amt{font-size:28px;font-weight:300;font-variant-numeric:tabular-nums;letter-spacing:-1.5px}
.d-kpis{display:grid;grid-template-columns:1fr 1fr;gap:0;background:var(--rule)}
.kc{background:var(--surface);padding:12px 14px;gap:0}
.kcl{font-size:8px;font-weight:700;color:var(--ink3);text-transform:uppercase;letter-spacing:1px;margin-bottom:3px}
.kcv{font-size:12px;font-weight:600;color:var(--ink);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.pb-bar{height:2px;background:var(--rule);border-radius:0;margin-top:8px;overflow:hidden}
.pw{height:2px;background:var(--rule);border-radius:0;margin:0 0 4px;overflow:hidden}
.pf{height:100%;border-radius:0;transition:width .5s}
.pl{font-size:10px;color:var(--ink3);padding:0 18px 12px;font-variant-numeric:tabular-nums}
.tb{background:var(--surface);border-radius:0;margin:0 0 0;box-shadow:none;overflow:hidden;border:none;border-bottom:1px solid var(--rule)}
.tbh{display:flex;align-items:stretch;cursor:pointer;transition:background .12s}
.tbh:active{background:var(--ground)}
.tbst{width:2px;flex-shrink:0}
.tbi{flex:1;padding:13px 16px;min-width:0}
.tbt{font-size:12px;font-weight:700;letter-spacing:.2px;margin-bottom:2px;color:var(--ink);text-transform:uppercase}
.tbc{font-size:10px;color:var(--ink3)}
.tbr{display:flex;flex-direction:column;align-items:flex-end;justify-content:center;padding:12px 16px 12px 8px;flex-shrink:0;gap:3px}
.tbto{font-size:13px;font-weight:600;font-variant-numeric:tabular-nums;letter-spacing:-.3px}
.tbg{font-size:9px;color:var(--ink3);font-weight:600;text-transform:uppercase;letter-spacing:.6px}
.tch{display:grid;grid-template-columns:80px 1fr 90px;gap:8px;padding:7px 18px;background:var(--ground);border-top:1px solid var(--rule);font-size:8px;font-weight:700;color:var(--ink3);text-transform:uppercase;letter-spacing:.8px}
.tch span:last-child{text-align:right}
.tr2{display:grid;grid-template-columns:80px 1fr 90px;gap:8px;align-items:flex-start;padding:10px 18px;border-top:.5px solid var(--rule-lt)}
.trd{font-size:10px;font-weight:600;color:var(--ink2);white-space:nowrap}
.trp{font-size:9px;margin-top:2px;font-weight:500;color:var(--ink3)}
.trdesc{font-size:12px;font-weight:500;color:var(--ink);word-break:break-word}
.trdesc.ed{color:var(--orange)}
.tra{font-size:12px;font-weight:600;font-variant-numeric:tabular-nums;color:var(--ink);text-align:right}
.trtot{display:grid;grid-template-columns:80px 1fr 90px;gap:8px;padding:11px 18px;background:var(--ground);border-top:1px solid var(--rule);font-size:12px;font-weight:600}

/* ── FORMS ── */
.fab{position:fixed;bottom:calc(env(safe-area-inset-bottom,0px) + 80px);right:18px;z-index:50;width:48px;height:48px;border-radius:4px;background:#1e3560;border:none;color:#fff;font-size:22px;box-shadow:0 4px 16px rgba(30,53,96,.3);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:transform .15s}
.fab:active{transform:scale(.93)}
.ov{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.4);display:none;align-items:flex-end;justify-content:center}
.ov.show{display:flex}
.ms{background:var(--surface);width:100%;max-width:480px;border-radius:0;max-height:88vh;overflow-y:auto;border-top:1px solid var(--rule)}
.fs{padding:20px 18px 32px}
.ftt{font-size:15px;font-weight:700;color:var(--ink);margin-bottom:16px;letter-spacing:.2px;text-transform:uppercase}
.fl{font-size:9px;font-weight:700;color:var(--ink3);text-transform:uppercase;letter-spacing:1px;display:block;margin-bottom:5px;margin-top:16px}
.fl:first-of-type{margin-top:0}
.fi{width:100%;background:var(--ground);border:1px solid var(--rule);border-radius:var(--r-sm);padding:12px 13px;font-size:14px;outline:none;color:var(--ink);-webkit-appearance:none;appearance:none;margin-bottom:2px;transition:border-color .18s}
.fi:focus{background:var(--surface);border-color:var(--accent)}
.seg{display:flex;background:var(--ground);border-radius:var(--r-sm);padding:2px;gap:2px;border:1px solid var(--rule)}

/* All rent properties = base (with overrides) + custom.
   Deleted properties (sold) are excluded unless includeDeleted=true */
function allRentProps(includeDeleted) {
  var base = RENT_PROPS_BASE
    .map(function(p) {
      var ov = RENT_PROP_OV[p.p] || {};
      return {p:p.p, t:ov.t||p.t, r:ov.r||p.r, _base:true, _deleted:!!ov.deleted};
    })
    .filter(function(p){ return includeDeleted || !p._deleted; });
  var custom = CP_RENT
    .map(function(p){ return {p:p.p, t:p.t, r:p.r, _base:false, _deleted:!!p.deleted}; })
    .filter(function(p){ return includeDeleted || !p._deleted; });
  return base.concat(custom);
}

function allProjs(includeDeleted) {
  var base = BASE_PROJ.map(function(p) {
    var ov = PROJ_OV[p.id] || {};
    return {
      id:p.id, cl:ov.cl||p.cl, loc:ov.loc||p.loc,
      area:(ov.area!=null)?ov.area:p.area,
      rate:ov.rate||p.rate, con:ov.con||p.con,
      _base:true, _deleted:!!ov.deleted
    };
  }).filter(function(p){ return includeDeleted || !p._deleted; });
  return base.concat(CP.map(function(p){
    return Object.assign({},p,{_base:false,_deleted:false});
  }));
}
function allCats() {
  var full = BASE_CATS.concat(CC);
  if (CAT_ORDER.length === 0) return full;
  /* Return in user-defined order, then anything not yet ordered at end */
  var ordered = CAT_ORDER.filter(function(c){ return full.indexOf(c) >= 0; });

  return ordered.concat(rest);

function allTx() {
  if (_txCache) return _txCache;
  var hist = H.map(function(r,i){
    var id = 'h'+i;
    if (RM_DEL.indexOf(id) >= 0) return null;
    var base = {d:r[0],p:r[1],t:r[2],cat:r[3],desc:r[4],pay:r[5],amt:r[6],id:id,_new:false,_ed:false};
    if (ED[id]) { var o=Object.assign({},base,ED[id]); o._ed=true; return o; }
    return base;
  }).filter(Boolean);

  var custom = NE.filter(function(e){ return RM_DEL.indexOf(e.id)<0; }).map(function(e){
    if (ED[e.id]) { var o=Object.assign({},e,ED[e.id]); o._ed=true; return o; }
    return e;
  });

  /* Map RENT_NE entries into the standard transaction format so they appear
     in Ledger, Overview income totals, net balance, and Categories */
  var MN = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
  /* Merge hardcoded base rent entries with dynamic user-added ones */
  var allRentNE = RENT_NE_H.concat(RENT_NE.filter(function(e){
    return !RENT_NE_H.some(function(h){ return h.id && h.id===e.id; });
  }));
  var rentTx = allRentNE.map(function(e) {
    var numM = monthsInRange(e.fromM, e.toM).length;
    var period = numM > 1 ? fmtM(e.fromM) + ' \u2013 ' + fmtM(e.toM) + ' (' + numM + ' mo)' : fmtM(e.fromM);
    var desc = e.pid + ' \u00b7 ' + e.tenant + ' \u00b7 ' + period;
    return {
      d:e.d, p:'RENT', t:'Client Payment', cat:'Rent Payment',
      desc:desc, pay:e.pay, amt:e.amt,
      id:e.id, _new:true, _ed:false, _isRent:true,
      _rentPid:e.pid, _rentFromM:e.fromM, _rentToM:e.toM
    };
  });

  /* Also include archived closed cycles as historical rent transactions */
  var archivedRent = [];
  CLOSED_CYCLES.forEach(function(cy) {
    cy.entries.forEach(function(e) {
      var numM = monthsInRange(e.fromM, e.toM).length;
      var period = numM > 1 ? fmtM(e.fromM) + ' \u2013 ' + fmtM(e.toM) + ' (' + numM + ' mo)' : fmtM(e.fromM);
      archivedRent.push({
        d:e.d, p:'RENT', t:'Client Payment', cat:'Rent Payment',
        desc:e.pid + ' \u00b7 ' + e.tenant + ' \u00b7 ' + period + ' [archived]',
        pay:e.pay, amt:e.amt, id:e.id, _new:false, _ed:false, _isRent:true
      });
    });
  });

  /* Pool Back entries — show in ledger as income to construction */
  var pbTx = PB.map(function(e){
    return {d:e.date,p:'P.W',t:'Client Payment',cat:'Pool Back (Haroon)',
            desc:e.desc,pay:'Personal',amt:e.amt,id:e.id,_pb:true,_new:false};
  });

  var all = hist.concat(custom).concat(rentTx).concat(archivedRent).concat(pbTx);
  all.forEach(function(e,i){ e._si = i; });
  all.sort(function(a,b){
    var dc = b.d.localeCompare(a.d);
    return dc !== 0 ? dc : a._si - b._si;
  });
  _txCache = all;
  return all;
}
function invalidateCache() { _txCache = null; }

/* \u2500\u2500 RENT DETAIL \u2500\u2500 */
/* \u2500\u2500 RENT UTILITIES \u2500\u2500 */
var _rentOpen = {};    // which previous cycles are expanded
var _showRentForm = false;

/* Generate a flat list of month strings: "Sep-25", "Oct-25", etc. */
function genMonthList(fromStr, count) {
  var MN = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
  var parts = fromStr.split("-");
  var mi = MN.indexOf(parts[0]);
  var yr = 2000 + parseInt(parts[1], 10);
  var result = [];
  for (var i = 0; i < count; i++) {
    result.push(MN[mi] + "-" + String(yr).slice(2));
    mi++;
    if (mi >= 12) { mi = 0; yr++; }
  }
  return result;
}

/* Compare two month strings: returns -1, 0, or 1 */
function cmpMonth(a, b) {
  var MN = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
  var ap = a.split("-"), bp = b.split("-");
  var ay = parseInt(ap[1],10), by = parseInt(bp[1],10);
  if (ay !== by) return ay < by ? -1 : 1;
  var am = MN.indexOf(ap[0]), bm = MN.indexOf(bp[0]);
  return am < bm ? -1 : am > bm ? 1 : 0;
}

/* Is month m between fromM and toM inclusive? */
function monthInRange(m, fromM, toM) {
  return cmpMonth(m, fromM) >= 0 && cmpMonth(m, toM) <= 0;
}

/* Months in a range (inclusive) */
function monthsInRange(fromM, toM) {
  var result = [], m = fromM;
  while (cmpMonth(m, toM) <= 0) {
    result.push(m);
    m = genMonthList(m, 2)[1]; // next month
  }
  return result;
}

/* Months for available dropdown \u2014 from Sep-25 to 36 months from now */
function availableMonths() {
  return genMonthList("Sep-25", 48);  // 4 years of months
}

/* Format month for display */
function fmtM(m) { return m.replace(/-(\d\d)$/, function(s,y){ return " '"+y; }); }

/* Get collected amounts from RENT_NE for a given property and month */
function rentCollected(propId, month) {
  var total = 0;
  allRentNE_combined().forEach(function(e) {
    if (e.pid === propId && monthInRange(month, e.fromM, e.toM)) {
      // Distribute pro-rata across months
      var numM = monthsInRange(e.fromM, e.toM).length;
      total += Math.round(e.amt / numM);
    }
  });
  return total;
}

/* Get all months that appear in any RENT_NE entry (beyond hardcoded) */
function rentNewMonths() {
  var hardcoded = RENT_CYCLES[RENT_CYCLES.length - 1].months;
  var seen = {};
  hardcoded.forEach(function(m){ seen[m] = true; });
  RENT_NE.forEach(function(e) {
    monthsInRange(e.fromM, e.toM).forEach(function(m) { seen[m] = true; });
  });
  // Return sorted list
  var all = Object.keys(seen);
  all.sort(function(a,b){ return cmpMonth(a,b); });
  return all;
}

/* Build the current cycle's full months list (hardcoded + user-added) */
function currentCycleMonths() {
  var cy = RENT_CYCLES[RENT_CYCLES.length - 1];
  return rentNewMonths().filter(function(m) {
    // Keep months within Sep-25 to Aug-26 (current year cycle)
    return cmpMonth(m, cy.months[0]) >= 0;
  });
}

/* Get collected amount for a property/month (hardcoded OR user-entered) */
function getAmount(propId, month) {
  // Check hardcoded cycles first
  var propIdx = RENT_PROPS_BASE.findIndex(function(p){ return p.p === propId; });
  var fromRNE = rentCollected(propId, month);
  if (propIdx >= 0) {
    for (var ci = 0; ci < RENT_CYCLES.length; ci++) {
      var cy = RENT_CYCLES[ci];
      var mi = cy.months.indexOf(month);
      if (mi >= 0 && cy.data[propIdx]) {
        return (cy.data[propIdx][mi] || 0) + fromRNE;
      }
    }
  }
  // Custom property \u2014 only from RENT_NE
  return fromRNE;
}

/* Grand total \u2014 uses allTx() so it always matches Overview & Ledger exactly */
function rentGrandTotal() {
  return allTx()
    .filter(function(t){ return t.p==='RENT' && t.t==='Client Payment'; })
    .reduce(function(s,t){ return s+t.amt; }, 0);
}

}

function buildCurrentMatrix(props, months, CELL, PCOL) {
  /* ── Horizontal scrollable table ─────────────────────────────────────
     Rows = months  |  Columns = properties
     Each cell shows the amount paid that month, or "—" if not recorded
     ------------------------------------------------------------------ */
  var COL   = 108;   /* px width per property column — fits Rs 31,50,000 */
  var MONCOL = 56;   /* px width for month label column                   */
  var totalW = MONCOL + (props.length * COL);

  var h = '<div style="overflow-x:auto;-webkit-overflow-scrolling:touch;padding:0 12px">';
  h += '<div style="min-width:' + totalW + 'px">';

  /* ── Header row: property names ── */
  h += '<div style="display:flex;border-bottom:1.5px solid #1a3a6e;background:#fff">';
  h += '<div style="width:' + MONCOL + 'px;flex-shrink:0;padding:10px 8px;font-size:10px;font-weight:700;color:#8a94a2;text-transform:uppercase;letter-spacing:.4px">Month</div>';
  props.forEach(function(prop) {
    h += '<div style="width:' + COL + 'px;flex-shrink:0;padding:10px 8px;text-align:center">';
    h += '<div style="font-size:11px;font-weight:700;color:#1a2332;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">' + prop.p + '</div>';
    h += '<div style="font-size:10px;color:#8a94a2;margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">' + prop.t + '</div>';
    h += '</div>';
  });
  h += '</div>';

  /* ── Data rows: one per month ── */
  var colTotals = props.map(function() { return 0; });
  months.forEach(function(m, mi) {
    var isAlt = mi % 2 === 1;
    h += '<div style="display:flex;background:' + (isAlt ? '#f8f9fb' : '#fff') + ';border-bottom:.5px solid #eceef2">';

    /* Month label */
    h += '<div style="width:' + MONCOL + 'px;flex-shrink:0;padding:10px 8px;font-size:12px;font-weight:600;color:#5a6678;white-space:nowrap">' + m + '</div>';

    /* Each property cell */
    props.forEach(function(prop, pi) {
      var cycle   = RENT_CYCLES[RENT_CYCLES.length - 1];
      var baseIdx = RENT_PROPS_BASE.findIndex(function(b) { return b.p === prop.p; });
      var rawAmt  = (baseIdx >= 0 && cycle.data[baseIdx] && cycle.data[baseIdx][mi]) ? cycle.data[baseIdx][mi] : 0;
      var neAmt   = 0;
      allRentNE_combined().forEach(function(e) { if (e.pid === prop.p && e.fromM === m) neAmt += e.amt; });
      var total   = rawAmt + neAmt;
      colTotals[pi] += total;
      var paid    = total > 0;

      h += '<div style="width:' + COL + 'px;flex-shrink:0;padding:10px 8px;text-align:center">';
      if (paid) {
        h += '<div style="font-size:12px;font-weight:700;color:#1a2332;font-variant-numeric:tabular-nums">' + Rs(total) + '</div>';
        h += '<div style="font-size:12px;color:#16a34a;margin-top:3px">✓</div>';
      } else {
        h += '<div style="font-size:16px;color:#d0d5dd">—</div>';
      }
      h += '</div>';
    });

    h += '</div>';
  });

  /* ── Totals row ── */
  h += '<div style="display:flex;background:#f0f4ff;border-top:1.5px solid #1a3a6e">';
  h += '<div style="width:' + MONCOL + 'px;flex-shrink:0;padding:10px 8px;font-size:10px;font-weight:700;color:#1e3a5f;text-transform:uppercase;letter-spacing:.3px">Total</div>';
  props.forEach(function(prop, pi) {
    h += '<div style="width:' + COL + 'px;flex-shrink:0;padding:10px 8px;text-align:center">';
    h += '<div style="font-size:12px;font-weight:800;color:#1e3a5f;font-variant-numeric:tabular-nums">' + Rs(colTotals[pi]) + '</div>';
    h += '</div>';
  });
  h += '</div>';

  h += '</div></div>';
  return h;
}

function buildHistCycleMatrix(cy, props, CELL, PCOL) {
  var h = '<div style="overflow-x:auto;-webkit-overflow-scrolling:touch">';
  h += '<div style="min-width:'+(PCOL+CELL*cy.months.length+78)+'px">';
  h += '<div style="display:flex;background:#e8eaee;border-bottom:2px solid #cdd1d9">';
  h += '<div style="width:'+PCOL+'px;min-width:'+PCOL+'px;flex-shrink:0;padding:8px 10px;font-size:9px;font-weight:700;color:#5a6678;text-transform:uppercase;letter-spacing:.5px;border-right:2px solid #cdd1d9">Property</div>';
  cy.months.forEach(function(m) {
    h += '<div style="width:'+CELL+'px;min-width:'+CELL+'px;flex-shrink:0;padding:8px 4px;font-size:9px;font-weight:700;color:#5a6678;text-align:center;border-right:1px solid #dde1e7">'+fmtM(m)+'</div>';
  });
  h += '<div style="width:100px;min-width:100px;flex-shrink:0;padding:8px;font-size:9px;font-weight:700;color:#5a6678;text-align:right;border-left:2px solid #cdd1d9">Total</div>';
  h += '</div>';
  cy.data.forEach(function(row, pi) {
    var prop = props[pi] || {p:'?',t:''};
    var rowTotal = row.reduce(function(s,v){return s+v;},0);
    h += '<div style="display:flex;border-bottom:.5px solid rgba(60,60,67,.1)">';
    h += '<div style="width:'+PCOL+'px;min-width:'+PCOL+'px;flex-shrink:0;padding:9px 10px;background:'+(pi%2?'#f3f5f8':'#f8f9fb')+';border-right:2px solid #cdd1d9">';
    h += '<div style="font-size:11px;font-weight:600;color:#1a2332">'+prop.p+'</div>';
    h += '<div style="font-size:9px;color:#8a94a2;margin-top:1px">'+prop.t+'</div></div>';
    row.forEach(function(v) {
      h += '<div style="width:'+CELL+'px;min-width:'+CELL+'px;flex-shrink:0;padding:9px 4px;font-size:10px;font-weight:'+(v>0?'600':'400')+';color:'+(v>0?'#1a2332':'#c0c8d4')+';background:#fff;text-align:center;font-variant-numeric:tabular-nums;border-right:1px solid #eceef2">'+(v>0?Rs(v):'\u2014')+'</div>';
    });
    h += '<div style="width:100px;min-width:100px;flex-shrink:0;padding:9px 8px;font-size:11px;font-weight:700;color:#1e3a5f;text-align:right;font-variant-numeric:tabular-nums;background:#f0f4ff;border-left:2px solid #cdd1d9">'+(rowTotal>0?Rs(rowTotal):'\u2014')+'</div>';
    h += '</div>';
  });
  // totals row
  h += '<div style="display:flex;background:#1e3a5f;border-top:2px solid #132d58">';
  h += '<div style="width:'+PCOL+'px;min-width:'+PCOL+'px;flex-shrink:0;padding:10px;font-size:10px;font-weight:700;color:rgba(255,255,255,.85);border-right:2px solid rgba(255,255,255,.2)">Monthly Total</div>';
  var cyGrand=0;
  cy.months.forEach(function(m,mi) {
    var mT=cy.data.reduce(function(s,row){return s+(row[mi]||0);},0);
    cyGrand+=mT;
    h += '<div style="width:'+CELL+'px;min-width:'+CELL+'px;flex-shrink:0;padding:10px 4px;font-size:10px;font-weight:700;color:#fff;text-align:center;font-variant-numeric:tabular-nums;border-right:1px solid rgba(255,255,255,.15)">'+Rs(mT)+'</div>';
  });
  h += '<div style="width:100px;min-width:100px;flex-shrink:0;padding:10px 8px;font-size:11px;font-weight:700;color:#8de8c0;text-align:right;font-variant-numeric:tabular-nums;border-left:2px solid rgba(255,255,255,.2)">'+Rs(cyGrand)+'</div>';
  h += '</div></div></div>';
  return h;
}

function buildClosedCycleMatrix(cy, CELL, PCOL) {
  // Simplified view for fully closed cycles
  var props = allRentProps();
  var h = '<div style="background:#F8F8F8;padding:12px 16px;border-bottom:.5px solid rgba(60,60,67,.1)">';
  h += '<div style="font-size:11px;color:#5a6678;margin-bottom:8px">'+cy.months.length+' months &nbsp;\u00b7&nbsp; '+cy.entries.length+' payment entries</div>';
  props.forEach(function(prop) {
    var propTotal = cy.entries.filter(function(e){return e.pid===prop.p;}).reduce(function(s,e){return s+e.amt;},0);
    if (propTotal > 0) {
      h += '<div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:.5px solid rgba(60,60,67,.1);font-size:12px">';
      h += '<span style="color:#1a2332;font-weight:500">'+prop.p+' <span style="color:#8a94a2;font-weight:400">'+prop.t+'</span></span>';
      h += '<span style="color:#0a7a50;font-weight:700;font-variant-numeric:tabular-nums">'+Rs(propTotal)+'</span>';
      h += '</div>';
    }
  });
  h += '</div>';
  return h;
}

function toggleRentCycle(id) {
  _rentOpen[id] = !_rentOpen[id];

}

/* \u2500\u2500 RENT ENTRY FORM \u2500\u2500 */
function openRentForm(editId) {

var _rentPayMethod = 'Cash';
var _editingRentId = null;  // ID of rent entry being edited (null = new)
function setRentPay(btn, val) {
  _rentPayMethod = val;
  document.querySelectorAll('#rent-seg-p .sgb').forEach(function(b){ b.classList.remove('on'); });
  btn.classList.add('on');
}
function rentPropChanged() {
  var pid = document.getElementById('rf-prop').value;
  var prop = allRentProps().find(function(p){return p.p===pid;});
  if (!prop) return;
  var sel = document.getElementById('rf-tenant');
  if (sel) {
    for (var i=0; i<sel.options.length; i++) {
      if (sel.options[i].value === prop.t) { sel.selectedIndex = i; break; }
    }
  }
}
function rentFromChanged() {
  updateRentMonthCount();
}
function rentToChanged() {
  updateRentMonthCount();
}
function updateRentMonthCount() {
  var fromM = document.getElementById('rf-from').value;
  var toM = document.getElementById('rf-to').value;
  if (cmpMonth(toM, fromM) < 0) {
    document.getElementById('rf-to').value = fromM;
    toM = fromM;
  }
  var n = monthsInRange(fromM, toM).length;
  var el = document.getElementById('rf-mcount');
  el.textContent = n + ' month' + (n===1?'':'s') + (n>1?' \u00b7 combined payment':'');
  el.style.background = n>1?'var(--blue-bg)':'var(--green-bg)';
  el.style.color = n>1?'var(--accent)':'var(--green)';
}
function closeRentForm() {
  var o = document.getElementById('rent-form-overlay');
  if (o) o.remove();
}
function saveRentEntry() {
  var pid    = document.getElementById('rf-prop').value;
  var tenant = document.getElementById('rf-tenant').value.trim();
  var fromM  = document.getElementById('rf-from').value;
  var toM    = document.getElementById('rf-to').value;
  var d      = document.getElementById('rf-date').value;
  var amt    = Number(document.getElementById('rf-amt').value);
  var err    = document.getElementById('rf-err');
  if (!amt || amt <= 0) { err.textContent='Enter a valid amount'; err.style.display='block'; return; }
  if (cmpMonth(toM, fromM) < 0) { err.textContent='To Month must be \u2265 From Month'; err.style.display='block'; return; }
  err.style.display='none';

  if (_editingRentId) {
    /* EDIT existing entry */
    var idx = RENT_NE.findIndex(function(e){ return e.id===_editingRentId; });
    if (idx >= 0) {
      RENT_NE[idx] = {id:_editingRentId, pid:pid, tenant:tenant, fromM:fromM, toM:toM, d:d, amt:amt, pay:_rentPayMethod};
    }
    _editingRentId = null;
    save(); closeRentForm();
    toast('Rent entry updated \u2713','#0a7a50');
  } else {
    /* NEW entry */
    RENT_NE.push({id:'r'+Date.now(), pid:pid, tenant:tenant, fromM:fromM, toM:toM, d:d, amt:amt, pay:_rentPayMethod});
    save(); closeRentForm();
    toast('Rent payment saved \u2713','#0a7a50');
  }

  /* Refresh everything consistently */
  updateNet();
  render();
  var dscrl = document.getElementById('d-scrl');
  if (document.getElementById('s-detail').classList.contains('active') && dscrl) {
    dscrl.innerHTML = buildRentPage();
  }
}
function delRentEntry(id) {
  showConfirm('This rent payment entry will be permanently removed.', function() {
    RENT_NE = RENT_NE.filter(function(e){ return e.id !== id; });
    save();
    updateNet();  /* update header net balance */
    render();     /* refresh current tab (Ledger/Overview/Categories) */
    /* if detail/rent screen is open, refresh it too */
    var dscrl = document.getElementById('d-scrl');
    if (document.getElementById('s-detail').classList.contains('active') && dscrl) {
      dscrl.innerHTML = buildRentPage();
    }
    toast('Rent entry deleted', '#be2b1e');
  }, 'Delete', 'Delete Rent Entry');
}

/* \u2500\u2500 CLOSE YEAR \u2500\u2500 */
function promptCloseYear() {
  var curMonths = currentCycleMonths();
  var curProps = allRentProps();
  var curTotal = 0;
  curProps.forEach(function(prop) {
    curMonths.forEach(function(m) { curTotal += getAmount(prop.p, m); });
  });
  var label = RENT_CYCLES[RENT_CYCLES.length-1].months[0]+' to '+curMonths[curMonths.length-1];
  var msg = 'Close rental year '+label+'?\n\nTotal collected: Rs '+curTotal.toLocaleString('en-PK')+'\n'+curMonths.length+' months recorded.\n\nThis archives the current cycle. A new cycle will start.';
  showConfirm(msg, function() {
  // Archive current cycle
  var archived = {
    id: 'cy_'+Date.now(),
    label: label,
    months: curMonths,
    total: curTotal,
    entries: RENT_NE.slice()
  };
  CLOSED_CYCLES.push(archived);
  RENT_NE = [];
  // Start new cycle - add to RENT_CYCLES (stored in memory, next entry creates new cycle)
  save();
  toast('Year closed. New cycle started.','#0a7a50');
  openRent();  }, 'Close Year', 'Close Rental Year');
}

function addRentProp() {
  var nameEl   = document.getElementById('rp-name');
  var tenantEl = document.getElementById('rp-tenant');
  var rateEl   = document.getElementById('rp-rate');
  var er       = document.getElementById('rp-er');
  if (!er) { toast('Please open Setup tab first','#be2b1e'); return; }
  var name   = (nameEl.value||'').trim();
  var tenant = (tenantEl.value||'').trim();
  var rate   = Number(rateEl.value);
  if (!name)          { er.textContent='Property name required';   er.style.display='block'; return; }
  if (!tenant)        { er.textContent='Tenant name required';     er.style.display='block'; return; }
  if (!rate||rate<=0) { er.textContent='Enter valid monthly rent'; er.style.display='block'; return; }
  if (allRentProps(true).find(function(p){ return p.p===name; }))
                      { er.textContent='Property already exists';  er.style.display='block'; return; }
  er.style.display='none';
  CP_RENT.push({p:name, t:tenant, r:rate, deleted:false});
  save();
  toast('Property "'+name+'" added ✓','#0a7a50');
  renderST();  /* re-renders and clears form */
}

/* Delete a property \u2014 base: mark deleted via override. Custom: remove entirely. */
function confirmDeleteProp(propName, baseFlag) {
  var isBase = baseFlag==='1' || baseFlag===true;
  var msg = isBase
    ? '"'+propName+'" will be removed from all dropdowns. Historical data is kept.'
    : '"'+propName+'" will be permanently deleted. Existing entries are kept.';
  showConfirm(msg, function() {
    if (isBase) {
      if (!RENT_PROP_OV[propName]) RENT_PROP_OV[propName] = {};
      RENT_PROP_OV[propName].deleted = true;
    } else {
      CP_RENT = CP_RENT.filter(function(p){ return p.p!==propName; });
    }
    save(); renderST(); toast('"'+propName+'" deleted');
  }, 'Delete', 'Delete Property');
}

function savePropEdit(propName, baseFlag) {
  var isBase  = baseFlag==='1' || baseFlag===true;
  var tenant  = document.getElementById('pe-tenant') ? document.getElementById('pe-tenant').value.trim() : '';
  var rate    = document.getElementById('pe-rate')   ? Number(document.getElementById('pe-rate').value)   : 0;
  var nameEl  = document.getElementById('pe-name');
  var newName = nameEl ? nameEl.value.trim() : propName;
  var errEl   = document.getElementById('pe-err');

  if (!tenant)       { if(errEl){errEl.textContent='Tenant name required';   errEl.style.display='block';} return; }
  if (!rate||rate<=0){ if(errEl){errEl.textContent='Enter valid monthly rent';errEl.style.display='block';} return; }
  if (errEl) errEl.style.display='none';

  if (isBase) {
    if (!RENT_PROP_OV[propName]) RENT_PROP_OV[propName]={};
    RENT_PROP_OV[propName].t = tenant;
    RENT_PROP_OV[propName].r = rate;
    RENT_PROP_OV[propName].deleted = false;
  } else {
    var idx = CP_RENT.findIndex(function(p){ return p.p===propName; });
    if (idx >= 0) {
      CP_RENT[idx].t = tenant;
      CP_RENT[idx].r = rate;
      CP_RENT[idx].deleted = false;
      if (newName && newName!==propName) CP_RENT[idx].p = newName;
    }
  }
  save(); closePropEdit();
  toast('Property updated','#0a7a50');
  renderST();
}

function saveSbConfig(url, key) {
  if (url && key) {
    try { localStorage.setItem('mc_own_bin', url.trim()); } catch(_e){}
    try { localStorage.setItem('mc_own_key', key.trim()); } catch(_e){}
    _ownBin = url.trim(); _ownKey = key.trim();
  } else {
    try { localStorage.removeItem('mc_own_bin'); localStorage.removeItem('mc_own_key'); } catch(_e){}
    _ownBin = ''; _ownKey = '';
  }
}

function moveCat(cat, dir) {
  var full = BASE_CATS.concat(CC);
  var current = allCats();
  var idx = current.indexOf(cat);
  var newIdx = idx + dir;
  if (newIdx < 0 || newIdx >= current.length) return;
  current.splice(idx, 1);
  current.splice(newIdx, 0, cat);
  CAT_ORDER = current;
  save(); renderST();
}

  CAT_ORDER = [];
  save(); renderST(); toast('Category order reset');
}

function _snapshot() {
  return {
    ts: Date.now(),
    NE:NE, ED:ED, RD:RM_DEL, CP:CP, CC:CC, CAC:CA_CUSTOM,
    POV:PROJ_OV, CO:CAT_ORDER, RNE:RENT_NE, CPR:CP_RENT,

  };

function _applyRemote(remote) {
  if (!remote || !remote.ts) return;
  if (remote.ts <= _lastSynced) return;

  /* Smart merge - combine NE from both devices so no entry is lost */
  var localNE  = NE.slice();
  var remoteNE = remote.NE || [];
  var merged   = localNE.slice();
  var localIds = {};
  localNE.forEach(function(e){ localIds[e.id] = true; });
  remoteNE.forEach(function(e){
    if (!localIds[e.id]) merged.push(e);
  });

  /* Merge RM_DEL (deleted IDs) from both */
  var localDel  = RM_DEL.slice();
  var remoteDel = remote.RD || [];
  var mergedDel = localDel.slice();
  remoteDel.forEach(function(id){
    if (mergedDel.indexOf(id) < 0) mergedDel.push(id);
  });

  /* For everything else take remote (settings, categories, projects) */
  NE=merged; RM_DEL=mergedDel;
  ED=Object.assign({}, remote.ED||{}, ED);
  CP=remote.CP||CP; CC=remote.CC||CC; CA_CUSTOM=remote.CAC||CA_CUSTOM;
  PROJ_OV=remote.POV||PROJ_OV; CAT_ORDER=remote.CO||CAT_ORDER;
  RENT_NE=remote.RNE||RENT_NE; CP_RENT=remote.CPR||CP_RENT;
  CLOSED_CYCLES=remote.CC2||CLOSED_CYCLES; RENT_PROP_OV=remote.RPO||RENT_PROP_OV;
  _lastSynced = remote.ts;
  invalidateCache();

  localStorage.setItem('mac_v9', JSON.stringify({
    NE:NE,ED:ED,RD:RM_DEL,CP:CP,CC:CC,CAC:CA_CUSTOM,
    POV:PROJ_OV,CO:CAT_ORDER,RNE:RENT_NE,CPR:CP_RENT,
    CC2:CLOSED_CYCLES,RPO:RENT_PROP_OV,PE:PE,PB:PB
  }));
  rebuildDropdowns();
  if(curTab==='ov') renderOV();
  else if(curTab==='lg') renderLG();
}

/* LOAD from JSONBin */
function cloudLoad(quiet) {
  if (!_useFirebase()&&(!_activeBin()||!_activeKey())) return;
  if (!quiet) setSyncStatus('loading');
  if (_useFirebase()) {
    fetch(_fbUrl+'/mc_state.json').then(function(r){return r.json();}).then(function(d){if(d&&typeof d==='object')_applyRemote(d);setSyncStatus('ok');_lastSynced=Date.now();}).catch(function(){setSyncStatus('error');});
    return;
  }
  fetch('https://api.jsonbin.io/v3/b/' + _activeBin() + '/latest', {
    headers: { 'X-Access-Key': _activeKey() }
  })
  .then(function(r) {
    if (!r.ok) return r.text().then(function(t){ throw new Error(r.status + ': ' + t.slice(0,80)); });
    return r.json();
  })
  .then(function(res) {
    if (!res || !res.record || !res.record.ts) { setSyncStatus('ok'); return; }
    _applyRemote(res.record);
    setSyncStatus('ok');
  })
  .catch(function(e) {
    if (!quiet) {
      setSyncStatus('err');
      toast('Sync: ' + (e.message || 'failed'), '#be2b1e');
    }
  });
}

/* SAVE to JSONBin */
function cloudSave() {
  if (!_useFirebase()&&(!_activeBin()||!_activeKey())) return;
  if (_syncTimer) clearTimeout(_syncTimer);
  _syncTimer = setTimeout(function() {
    setSyncStatus('saving');
    var snap = _snapshot();
    if (_useFirebase()) {
      fetch(_fbUrl+'/mc_state.json',{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(snap)}).then(function(){setSyncStatus('ok');_lastSynced=Date.now();}).catch(function(){setSyncStatus('error');});
      return;
    }
    fetch('https://api.jsonbin.io/v3/b/' + _activeBin(), {
      method:  'PUT',
      headers: { 'Content-Type': 'application/json', 'X-Access-Key': _activeKey() },
      body:    JSON.stringify(snap)
    })
    .then(function(r) {
      if (r.ok) { _lastSynced = snap.ts; setSyncStatus('ok'); }
      else setSyncStatus('err');
    })
    .catch(function() { setSyncStatus('err'); });
  }, 800);
}

function exportForClaude() {
  /* Format NE[] entries as H[] code lines ready to paste into Claude */
  var filteredNE = NE.filter(function(e){
    return !RM_DEL.includes(e.id);
  });
  if(!filteredNE.length){
    toast('No new entries to export — everything is already in the base file.','#1e3560');
    return;
  }

  var lines = filteredNE.map(function(e){
    var d   = (e.d||e.date||'').slice(0,10);
    var p   = e.p   || '';
    var typ = e.t   || 'Expense';
    var cat = e.cat || 'General expenses';
    var desc= (e.desc||'').replace(/\\/g,'\\\\').replace(/"/g,'\\"');
    var pay = e.pay || 'Cash';
    var amt = Math.round(e.amt||0);
    return '["'+d+'", "'+p+'", "'+typ+'", "'+cat+'", "'+desc+'", "'+pay+'", '+amt+']';
  });

  var header  = '/* NEW ENTRIES — paste to Claude and say "add these to the app file" */\n';
  header += '/* Total: '+lines.length+' entr'+(lines.length===1?'y':'ies')+' | '+new Date().toLocaleDateString('en-PK',{day:'2-digit',month:'short',year:'numeric'})+' */\n\n';
  var output  = header + lines.join(',\n');

  /* Copy to clipboard + share */
  if(navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(output).then(function(){
      toast('Copied! Paste into Claude and say "add these entries to the app".','#2a6b4a');
    }).catch(function(){ _shareOrDownloadExport(output); });
  } else {
    _shareOrDownloadExport(output);
  }
}

function _shareOrDownloadExport(text) {
  var blob = new Blob([text], {type:'text/plain'});
  var file = new File([blob], 'new-entries-for-claude.txt', {type:'text/plain'});
  if(navigator.share && navigator.canShare && navigator.canShare({files:[file]})){
    navigator.share({title:'New Entries for Claude', files:[file]}).catch(function(){});
  } else {
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a');
    a.href=url; a.download='new-entries-for-claude.txt';
    a.click(); URL.revokeObjectURL(url);
    toast('Downloaded! Paste into Claude.','#2a6b4a');
  }
}

/* ── beforeprint / afterprint handlers (set up once on first print) ── */
var _printHandlersAdded = false;
function _addPrintHandlers() {
  if (_printHandlersAdded) return;
  _printHandlersAdded = true;

  window.addEventListener('beforeprint', function() {
    var ov = document.getElementById('print-overlay');
    if (!ov) return;
    /* 1. Save original styles */
    ov._origStyle   = ov.getAttribute('style') || '';
    document.body._origOv  = document.body.style.overflow;
    document.body._origH   = document.body.style.height;
    document.documentElement._origOv = document.documentElement.style.overflow;
    document.documentElement._origH  = document.documentElement.style.height;
    /* 2. Make overlay static so it flows into the print page */
    ov.style.cssText = 'position:static;overflow:visible;height:auto;background:#f5f7fa';
    /* 3. Remove overflow restrictions from root elements */
    document.body.style.overflow = 'visible';
    document.body.style.height   = 'auto';
    document.documentElement.style.overflow = 'visible';
    document.documentElement.style.height   = 'auto';
    /* 4. Hide every sibling of the overlay */
    Array.from(document.body.children).forEach(function(el) {
      if (el.id !== 'print-overlay') {
        el._printHidden = el.style.display;
        el.style.display = 'none';
      }
    });
  });

  window.addEventListener('afterprint', function() {
    var ov = document.getElementById('print-overlay');
    if (!ov) return;
    /* Restore overlay */
    ov.style.cssText = ov._origStyle || 'position:fixed;inset:0;z-index:10000;background:#f5f7fa;overflow-y:auto;-webkit-overflow-scrolling:touch';
    /* Restore root styles */
    document.body.style.overflow = document.body._origOv || '';
    document.body.style.height   = document.body._origH  || '';
    document.documentElement.style.overflow = document.documentElement._origOv || '';
    document.documentElement.style.height   = document.documentElement._origH  || '';
    /* Restore siblings */
    Array.from(document.body.children).forEach(function(el) {
      if (el.id !== 'print-overlay' && el._printHidden !== undefined) {
        el.style.display = el._printHidden;
        delete el._printHidden;
      }
    });
  });
}

    '<style>' + PRINT_CSS + '</style>' +
    '<div id="po-toolbar" style="position:sticky;top:0;z-index:2;background:#1e3a5f;padding:12px 14px;display:flex;align-items:center;gap:10px;box-shadow:0 2px 12px rgba(0,0,0,.3)">' +

/* ── doDownload: save HTML file ── */
function doDownload() {
  var content = _pContent();
  if (!content) return;

  var tm = content.match(/class="pm-title"[^>]*>([^<]+)/);
  var title = tm ? tm[1].trim() : 'Report';
  var fname = 'MC-' + title.replace(/[^a-z0-9]/gi, '-').replace(/-+/g, '-') + '.html';

  var fullHtml = '<!DOCTYPE html><html><head><meta charset="utf-8">'
    + '<meta name="viewport" content="width=device-width,initial-scale=1">'
    + '<title>' + title + '</title>'
    + '<style>' + PRINT_CSS + 'body{background:#f5f7fa}</style>'
    + '</head><body>'
    + '<div id="po-toolbar" style="position:sticky;top:0;background:#1e3a5f;padding:12px 16px;text-align:center;box-shadow:0 2px 8px rgba(0,0,0,.25)">'
    + '<button onclick="window.print()" style="padding:12px 36px;background:#16a34a;color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:800;cursor:pointer">Print / Save as PDF</button>'
    + '</div>'
    + '<div id="po-wrap"><div class="pm-box">' + content + '</div></div>'
    + '</body></html>';

  /* iOS: Share Sheet with File */
  if (/iPhone|iPad|iPod/i.test(navigator.userAgent) && navigator.share) {
    try {
      var f = new File([fullHtml], fname, {type:'text/html'});
      if (navigator.canShare && navigator.canShare({files:[f]})) {
        navigator.share({files:[f], title: title});
        return;
      }
    } catch(e){}
  }

  /* Desktop & Android: blob download */
  try {
    var blob = new Blob([fullHtml], {type:'text/html'});
    var url  = URL.createObjectURL(blob);
    var a    = document.createElement('a');
    a.style.display = 'none'; a.href = url; a.download = fname;
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    setTimeout(function(){ URL.revokeObjectURL(url); }, 6000);
    toast('Downloaded \u2014 open file then Ctrl+P \u2192 Save as PDF', '#0a7a50');
  } catch(e) {
    toast('Download failed: ' + e.message, '#be2b1e');
  }
}

  d.onclick = function(e){ if(e.target===d) d.remove(); };
  d.innerHTML =
    '<div class="ms"><div class="mpu"></div>'+
    '<div class="mhe"><div class="mti">App PIN Lock</div>'+
    '<button class="mcl" onclick="this.closest(\'.ov\').remove()">&#x2715;</button></div>'+
    '<div class="fbd">'+
    '<p style="font-size:13px;color:var(--ink2);line-height:1.6;margin-bottom:16px">'+hint+'</p>'+
    '<label class="fl" style="margin-top:0">New PIN (numbers only)</label>'+
    '<input class="fi" id="pin-new" type="password" inputmode="numeric" maxlength="8" placeholder="4\u20138 digits \u2014 leave blank to remove">'+
    '<label class="fl">Confirm PIN</label>'+
    '<input class="fi" id="pin-cfm" type="password" inputmode="numeric" maxlength="8" placeholder="Repeat PIN">'+
    '<div id="pin-setup-err" class="fer"></div>'+
    '<div class="fbs"><button class="bcn" onclick="this.closest(\'.ov\').remove()">Cancel</button>'+
    '<button class="bsv" onclick="savePinSetup()">Save PIN</button></div>'+
    '</div></div>';
  document.body.appendChild(d);
}
function savePinSetup() {
  var n = (document.getElementById('pin-new').value||'').trim();
  var c = (document.getElementById('pin-cfm').value||'').trim();
  var err = document.getElementById('pin-setup-err');
  if (n && n!==c)           { err.textContent='PINs do not match'; err.style.display='block'; return; }
  if (n && !/^\d+$/.test(n)){ err.textContent='Numbers only';     err.style.display='block'; return; }
  var ov = document.getElementById('pin-new').closest('.ov');
  if (ov) ov.remove();
  _APP_PIN = n;
  try { if (n) localStorage.setItem('mc_app_pin', n); else localStorage.removeItem('mc_app_pin'); } catch(_e){}
  toast(n ? 'PIN set \u2713' : 'PIN removed', n ? '#0a7a50' : '#5a6678');
  renderST();
}

(function(){
  loadSaved();
  rebuildDropdowns();
  setSyncStatus('loading'); cloudLoad(); startPolling();
  renderOV();
  if (_APP_PIN) showLockScreen();
})();
</script>
